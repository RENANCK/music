<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAKE YOU PLAYLIST</title>

  <style>
    :root {
      --bg-site: #242424;
      --cinza-topo: #aaa9a7;
      --azul-titulo: #3470b8;
      --azul-claro: #eaf0ff;
      --roxo-1: #d997ee;
      --roxo-2: #bd9bf4;
      --roxo-3: #e3a2ec;
      --ciano-glitch: #00d9ff;
      --rosa-glitch: #ff0b86;
      --verde: #c8ffd9;
      --azul-bg: #8eb9ff;
      --preto: #1a1a1a;
      --branco: #fff;
      --sombra: 0 18px 35px rgba(0,0,0,.25);
      --foto-home: url("./assets/1000490664.jpg");
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg-site);
      font-family: Impact, Haettenschweiler, "Arial Black", sans-serif;
      color: var(--preto);
      overflow-x: hidden;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .home-page {
      width: min(100%, 682px);
      min-height: 100vh;
      background: var(--azul-claro);
      position: relative;
      overflow: hidden;
      border-left: 2px solid #111;
      border-right: 2px solid #111;
      box-shadow: 0 0 35px rgba(0,0,0,.55);
    }

    .topo {
      background: var(--cinza-topo);
      text-align: center;
      padding: 18px 18px 8px;
      text-transform: uppercase;
      letter-spacing: 4px;
      font-family: "Arial Black", Impact, sans-serif;
      color: transparent;
      -webkit-text-stroke: 1px #151515;
      font-size: clamp(15px, 2.4vw, 22px);
      line-height: 1.28;
    }

    .titulo-principal {
      margin: 4px 0 0;
      font-size: clamp(38px, 7vw, 58px);
      line-height: .9;
      color: var(--azul-titulo);
      -webkit-text-stroke: 0;
      letter-spacing: 1px;
      font-family: "Arial Black", Impact, sans-serif;
    }

    .moods-area {
      background: var(--azul-claro);
      padding: 35px 48px 17px;
      min-height: 288px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px 38px;
      align-items: center;
    }

    .mood-btn {
      border: none;
      min-height: 56px;
      border-radius: 8px;
      padding: 8px 12px;
      background: linear-gradient(135deg, var(--roxo-1), var(--roxo-2));
      color: #09003a;
      font-family: Impact, "Arial Black", sans-serif;
      font-size: clamp(22px, 4vw, 34px);
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      position: relative;
      box-shadow: 0 8px 0 rgba(126,84,185,.25);
      transition: .18s ease;
      text-shadow:
        -3px 0 var(--ciano-glitch),
         3px 0 var(--rosa-glitch),
         0 2px #000;
    }

    .mood-btn:nth-child(1),
    .mood-btn:nth-child(3),
    .mood-btn:nth-child(5) {
      background: linear-gradient(135deg, #e6a0ee, #d790ec);
    }

    .mood-btn:nth-child(2),
    .mood-btn:nth-child(6),
    .mood-btn:nth-child(7) {
      background: linear-gradient(135deg, #c8a2f5, #b994f0);
    }

    .mood-btn:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 12px 0 rgba(126,84,185,.25), 0 16px 25px rgba(0,0,0,.2);
      filter: brightness(1.06);
    }

    .mood-btn:active {
      transform: translateY(2px) scale(.99);
      box-shadow: 0 3px 0 rgba(126,84,185,.35);
    }

    .mood-btn.pequeno {
      font-size: clamp(18px, 3.3vw, 28px);
    }

    .mood-btn.largo {
      grid-column: 1 / 2;
    }

    .foto-area {
      min-height: 300px;
      background: linear-gradient(90deg, var(--verde) 0%, #c7ffe1 22%, var(--azul-bg) 78%, #8db8ff 100%);
      position: relative;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 0;
    }

    .foto-card {
      width: min(68%, 464px);
      height: 222px;
      background-image: var(--foto-home);
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      box-shadow: var(--sombra);
      position: relative;
      z-index: 2;
    }

    .rodape-colorido {
      height: 20px;
      width: 100%;
      position: absolute;
      bottom: 0;
      left: 0;
      background: linear-gradient(90deg, #002cff, #8338ec, #ff3edb);
      z-index: 5;
    }

    .advanced-box {
      position: absolute;
      left: 35px;
      bottom: 56px;
      width: 150px;
      min-height: 66px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,.75);
      color: #150097;
      font-family: Impact, "Arial Black", sans-serif;
      font-size: 15px;
      line-height: 1.05;
      text-align: left;
      padding: 10px 12px;
      cursor: pointer;
      z-index: 8;
      box-shadow: 0 8px 20px rgba(0,0,0,.18);
      text-shadow:
        -1px 0 var(--ciano-glitch),
         1px 0 var(--rosa-glitch);
      text-transform: uppercase;
      transition: .18s ease;
    }

    .advanced-box:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,.92);
    }

    .quantidade-box {
      position: absolute;
      left: 35px;
      bottom: 128px;
      width: 150px;
      background: rgba(255,255,255,.78);
      border-radius: 8px;
      padding: 8px 10px;
      z-index: 8;
      box-shadow: 0 8px 20px rgba(0,0,0,.14);
    }

    .quantidade-box label {
      display: block;
      font-family: Impact, "Arial Black", sans-serif;
      font-size: 12px;
      text-transform: uppercase;
      color: #150097;
      margin-bottom: 5px;
      text-shadow:
        -1px 0 var(--ciano-glitch),
         1px 0 var(--rosa-glitch);
    }

    .quantidade-box input {
      width: 100%;
      height: 30px;
      border: none;
      border-radius: 5px;
      outline: none;
      text-align: center;
      font-family: "Arial Black", Arial, sans-serif;
      color: #150097;
      font-size: 17px;
      background: rgba(255,255,255,.9);
    }

    .assinatura {
      position: absolute;
      right: 80px;
      bottom: 38px;
      z-index: 8;
      color: #eaffdd;
      font-family: Impact, "Arial Black", sans-serif;
      font-size: 29px;
      letter-spacing: 5px;
      line-height: 1.25;
      text-transform: uppercase;
      text-shadow:
        2px 0 #6eff9d,
        -2px 0 #ffffff,
        0 0 12px rgba(255,255,255,.8);
    }

    .assinatura::before {
      content: "• BY:";
      display: block;
      font-size: 23px;
      letter-spacing: 4px;
    }

    @media (max-width: 720px) {
      body {
        display: block;
      }

      .home-page {
        width: 100%;
        border: none;
        min-height: 100dvh;
      }

      .topo {
        padding: 18px 12px 10px;
        letter-spacing: 2px;
      }

      .titulo-principal {
        font-size: clamp(33px, 10vw, 54px);
      }

      .moods-area {
        padding: 28px 18px 20px;
        grid-template-columns: repeat(2, 1fr);
        gap: 18px 18px;
        min-height: auto;
      }

      .mood-btn {
        min-height: 58px;
        font-size: clamp(21px, 7vw, 32px);
      }

      .mood-btn.pequeno {
        font-size: clamp(17px, 5.8vw, 26px);
      }

      .foto-area {
        min-height: 360px;
        padding-top: 0;
      }

      .foto-card {
        width: 88%;
        height: 210px;
      }

      .quantidade-box {
        left: 18px;
        bottom: 112px;
        width: 142px;
      }

      .advanced-box {
        left: 18px;
        bottom: 42px;
        width: 142px;
      }

      .assinatura {
        right: 18px;
        bottom: 42px;
        font-size: 22px;
        letter-spacing: 3px;
      }

      .assinatura::before {
        font-size: 18px;
      }
    }

    @media (max-width: 420px) {
      .moods-area {
        gap: 14px;
      }

      .mood-btn {
        border-radius: 7px;
        min-height: 52px;
        letter-spacing: 1px;
      }

      .foto-card {
        width: 94%;
        height: 185px;
      }

      .assinatura {
        font-size: 18px;
        right: 12px;
      }

      .assinatura::before {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <main class="home-page">
    <header class="topo">
      <div>(LINK CLICAVEL)</div>
      <div>SOUNDON.GLOBAL</div>
      <div>/BIO/RENANCK</div>
      <h1 class="titulo-principal">MAKE YOU PLAYLIST</h1>
    </header>

    <section class="moods-area">
      <button class="mood-btn" onclick="irParaPlayer('party')">PARTY</button>
      <button class="mood-btn pequeno" onclick="irParaPlayer('noite_sozinho')">SOZINHO</button>
      <button class="mood-btn" onclick="irParaPlayer('foco')">FOCO</button>

      <button class="mood-btn pequeno" onclick="irParaPlayer('modo_shonem')">SHONEN</button>
      <button class="mood-btn" onclick="irParaPlayer('noite_neon')">NEON</button>
      <button class="mood-btn pequeno" onclick="irParaPlayer('faculdade_fm')">FDT</button>

      <button class="mood-btn pequeno largo" onclick="irParaPlayer('caminhada')">CAMINHADA</button>
    </section>

    <section class="foto-area">
      <div class="foto-card"></div>

      <div class="quantidade-box">
        <label for="total_musicas_home">Quantidade</label>
        <input id="total_musicas_home" type="number" min="1" value="18" />
      </div>

      <button class="advanced-box" onclick="abrirAvancado()">
        ABRIR<br>
        OPÇÕES<br>
        AVANÇADAS
      </button>

      <div class="assinatura">RENANCK</div>
      <div class="rodape-colorido"></div>
    </section>
  </main>

  <script>
    function salvarTotal() {
      const total = document.getElementById('total_musicas_home').value || '18';
      localStorage.setItem('totalMusicasSelecionado', total);
    }

    function irParaPlayer(moodKey) {
      salvarTotal();
      localStorage.setItem('moodSelecionado', moodKey);
      localStorage.removeItem('abrirAvancado');
      window.location.href = './player.html';
    }

    function abrirAvancado() {
      salvarTotal();
      localStorage.removeItem('moodSelecionado');
      localStorage.setItem('abrirAvancado', '1');
      window.location.href = './player.html';
    }

    window.addEventListener('DOMContentLoaded', () => {
      const totalSalvo = localStorage.getItem('totalMusicasSelecionado');
      if (totalSalvo) {
        const input = document.getElementById('total_musicas_home');
        if (input) input.value = totalSalvo;
      }
    });
  </script>
</body>
</html>
