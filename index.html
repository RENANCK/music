<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mix Hiperfoco - Renanck</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 30px; display: flex; flex-direction: column; align-items: center; }
        .container { background-color: #1e1e1e; padding: 30px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.5); border: 1px solid #333; width: 100%; max-width: 600px; }
        h1 { margin-top: 0; color: #ffffff; text-align: center; font-size: 1.8rem; }
        p { color: #b3b3b3; text-align: center; margin-bottom: 25px; font-size: 0.95rem; }
        
        /* Botão de Login do Spotify */
        #btn-login { background-color: #1DB954; color: white; border: none; padding: 12px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 20px; font-size: 1rem; transition: 0.2s; }
        #btn-login:hover { background-color: #1ed760; }
        #btn-login.conectado { background-color: #333; color: #1DB954; border: 1px solid #1DB954; cursor: default; }

        /* Controles de Porcentagem */
        .controles-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; background-color: #181818; padding: 20px; border-radius: 8px; border: 1px solid #2a2a2a; }
        .input-group { display: flex; justify-content: space-between; align-items: center; background-color: #222; padding: 8px 15px; border-radius: 6px; }
        .input-group label { font-weight: 500; color: #ccc; font-size: 0.9rem; }
        .input-wrapper { display: flex; align-items: center; }
        .input-wrapper input { width: 50px; background-color: #333; color: #fff; border: 1px solid #444; padding: 5px; border-radius: 4px; text-align: center; font-weight: bold; }
        .input-wrapper input:focus { outline: none; border-color: #4CAF50; }
        
        /* Botões de Ação e Inputs Novos */
        .btn-gerar { background-color: #4CAF50; color: white; border: none; padding: 15px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1rem; width: 100%; transition: all 0.2s; margin-bottom: 15px; }
        .btn-gerar:hover { background-color: #45a049; }

        /* Novo estilo para o input do nome da playlist */
        .input-nome-playlist { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background-color: #222; color: white; font-size: 1rem; box-sizing: border-box; margin-bottom: 15px; display: none; }
        .input-nome-playlist:focus { outline: none; border-color: #1DB954; }

        .btn-exportar { background-color: #1DB954; color: white; border: none; padding: 15px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; width: 100%; transition: all 0.2s; margin-bottom: 30px; display: none; }
        .btn-exportar:hover { background-color: #1ed760; }

        /* Resultados */
        #playlist-resultado { display: flex; flex-direction: column; gap: 8px; }
        .track-item { display: flex; align-items: center; background-color: #181818; padding: 12px 20px; border-radius: 8px; text-decoration: none; color: #e0e0e0; border: 1px solid #222; transition: 0.2s;}
        .track-item:hover { border-color: #4CAF50; }
        .track-number { color: #888; font-weight: bold; width: 30px; }
        .track-category { background-color: #333; font-size: 0.75rem; padding: 3px 8px; border-radius: 12px; margin-right: 15px; color: #aaa; min-width: 80px; text-align: center; }
        .empty-state { text-align: center; color: #666; font-style: italic; padding: 20px 0; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Meu Mix Hiperfoco</h1>
        <p>Crie sua playlist customizada em segundos.</p>
        
        <button id="btn-login" onclick="loginSpotify()">Conectar com Spotify</button>

        <div class="controles-grid">
            <div class="input-group"><label>Nostálgica</label><div class="input-wrapper"><input type="number" id="perc_nostalgica" min="0" value="0"></div></div>
            <div class="input-group"><label>INFINITE</label><div class="input-wrapper"><input type="number" id="perc_infinite" min="0" value="0"></div></div>
            <div class="input-group"><label>TRAP</label><div class="input-wrapper"><input type="number" id="perc_trap" min="0" value="0"></div></div>
            <div class="input-group"><label>FOCO</label><div class="input-wrapper"><input type="number" id="perc_foco" min="0" value="0"></div></div>
            <div class="input-group"><label>MPB</label><div class="input-wrapper"><input type="number" id="perc_mpb" min="0" value="0"></div></div>
            <div class="input-group"><label>Motivação</label><div class="input-wrapper"><input type="number" id="perc_motivacao" min="0" value="0"></div></div>
            <div class="input-group"><label>De Agora</label><div class="input-wrapper"><input type="number" id="perc_de_agora" min="0" value="0"></div></div>
        </div>

        <button class="btn-gerar" onclick="gerarPlaylist()">1. Gerar Mix Perfeito</button>
        
        <input type="text" id="nome_playlist" class="input-nome-playlist" placeholder="Dê um nome para sua playlist (Ex: Sessão de Estudos)">
        <button id="btn-exportar" class="btn-exportar" onclick="exportarParaSpotifyAPI()">2. Criar Playlist Automática no Spotify ✨</button>

        <div id="playlist-resultado">
            <div class="empty-state">Sua playlist aparecerá aqui...</div>
        </div>
    </div>

    <script>
        // ======= CONFIGURAÇÕES GERAIS =======
        const CLIENT_ID = '3effb29e1f6f451f82533d761edee1bd'; 
        const REDIRECT_URI = 'https://renanck.github.io/GERADOR-DE-MUSICAS1/index.html';
        let accessToken = null;
        let linksAtuais = [];

        // ======= SISTEMA DE LOGIN (PKCE) =======
        function generateRandomString(length) {
            let text = '';
            let possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            for (let i = 0; i < length; i++) {
                text += possible.charAt(Math.floor(Math.random() * possible.length));
            }
            return text;
        }

        async function generateCodeChallenge(codeVerifier) {
            const data = new TextEncoder().encode(codeVerifier);
            const digest = await window.crypto.subtle.digest('SHA-256', data);
            return btoa(String.fromCharCode.apply(null, [...new Uint8Array(digest)]))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/, '');
        }

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');

            if (code) {
                const codeVerifier = localStorage.getItem('code_verifier');
                const body = new URLSearchParams({
                    client_id: CLIENT_ID,
                    grant_type: 'authorization_code',
                    code: code,
                    redirect_uri: REDIRECT_URI,
                    code_verifier: codeVerifier
                });

                try {
                    const response = await fetch('https://accounts.spotify.com/api/token', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: body
                    });

                    const data = await response.json();
                    
                    if (data.access_token) {
                        accessToken = data.access_token;
                        window.history.replaceState({}, document.title, window.location.pathname);
                        
                        const btnLogin = document.getElementById('btn-login');
                        btnLogin.innerText = "🟢 Spotify Conectado";
                        btnLogin.classList.add("conectado");
                        btnLogin.onclick = null;
                    } else {
                        console.error("Erro ao gerar token:", data);
                    }
                } catch (e) {
                    console.error('Falha de conexão:', e);
                }
            }
        };

        async function loginSpotify() {
            const codeVerifier = generateRandomString(128);
            localStorage.setItem('code_verifier', codeVerifier);
            const codeChallenge = await generateCodeChallenge(codeVerifier);

            const scopes = 'playlist-modify-public playlist-modify-private';
            const authUrl = `https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=code&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${encodeURIComponent(scopes)}&code_challenge_method=S256&code_challenge=${codeChallenge}`;
            
            window.location.href = authUrl;
        }

        // ======= BANCO DE MÚSICAS COMPLETO =======
        const nomesCategorias = { nostalgica: "Nostálgica", infinite: "INFINITE", trap: "TRAP", foco: "FOCO", mpb: "MPB", motivacao: "Motivação", de_agora: "De Agora" };
        
        // Coloque seus links REAIS do Spotify aqui. Ex: "https://open.spotify.com/track/4cOdK2wGLETKBW3PvgPWqT"
        const bancoDeMusicas = {
            "trap": [
                "https://open.spotify.com/track/exemplo1", "https://open.spotify.com/track/exemplo2" // Substitua pelos seus links
            ],
            "nostalgica": [
                 "https://open.spotify.com/track/exemplo3" // Substitua pelos seus links
            ],
            "mpb": [],
            "motivacao": [],
            "infinite": [],
            "foco": [],
            "de_agora": []
        };

        // ======= LÓGICA DE SORTEIO =======
        function embaralhar(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function calcularVagasExatas(pesos, totalVagas = 12) {
            let somaPesos = Object.values(pesos).reduce((a, b) => a + b, 0);
            if (somaPesos === 0) return null;

            let inteiros = {};
            let restos = [];

            for (let cat in pesos) {
                let valorExato = (pesos[cat] / somaPesos) * totalVagas;
                inteiros[cat] = Math.floor(valorExato);
                restos.push({ cat: cat, resto: valorExato - inteiros[cat] });
            }

            let somaInteiros = Object.values(inteiros).reduce((a, b) => a + b, 0);
            let vagasRestantes = totalVagas - somaInteiros;

            restos.sort((a, b) => b.resto - a.resto);
            for (let i = 0; i < vagasRestantes; i++) { inteiros[restos[i].cat]++; }

            return inteiros;
        }

        function sortearDaLista(lista, quantidade) {
            if (!lista || lista.length === 0) return [];
            let copia = [...lista];
            copia = embaralhar(copia);
            return copia.slice(0, Math.min(quantidade, lista.length)); 
        }

        function gerarPlaylist() {
            const pesos = {
                nostalgica: Number(document.getElementById('perc_nostalgica').value),
                infinite: Number(document.getElementById('perc_infinite').value),
                trap: Number(document.getElementById('perc_trap').value),
                foco: Number(document.getElementById('perc_foco').value),
                mpb: Number(document.getElementById('perc_mpb').value),
                motivacao: Number(document.getElementById('perc_motivacao').value),
                de_agora: Number(document.getElementById('perc_de_agora').value)
            };

            const vagas = calcularVagasExatas(pesos, 12);
            if (!vagas) { alert("Aviso: Você precisa digitar pelo menos um número maior que zero!"); return; }

            let faixasSorteadas = [];
            linksAtuais = []; 

            for (let categoria in vagas) {
                if (vagas[categoria] > 0) {
                    const linksSorteados = sortearDaLista(bancoDeMusicas[categoria], vagas[categoria]);
                    linksSorteados.forEach(url => {
                        faixasSorteadas.push({ categoria: nomesCategorias[categoria], link: url });
                        linksAtuais.push(url);
                    });
                }
            }
            
            faixasSorteadas = embaralhar(faixasSorteadas);
            linksAtuais = faixasSorteadas.map(faixa => faixa.link);

            const divResultado = document.getElementById('playlist-resultado');
            let htmlResultado = ''; // Otimização na montagem do HTML

            faixasSorteadas.forEach((faixa, index) => {
                htmlResultado += `
                    <a href="${faixa.link}" target="_blank" class="track-item">
                        <span class="track-number">${index + 1}</span>
                        <span class="track-category">${faixa.categoria}</span>
                        <span class="track-name">Ouvir faixa sorteada 🎵</span>
                    </a>
                `;
            });
            
            divResultado.innerHTML = htmlResultado;

            // Mostra o campo de nome e o botão de exportar
            document.getElementById('nome_playlist').style.display = 'block';
            document.getElementById('btn-exportar').style.display = 'block';
        }

        // ======= API DO SPOTIFY: CRIANDO PLAYLIST =======
        async function exportarParaSpotifyAPI() {
            if (!accessToken) {
                alert("Opa! Você precisa clicar no botão de 'Conectar com Spotify' primeiro!");
                return;
            }

            const btn = document.getElementById('btn-exportar');
            btn.innerText = "⏳ Montando Playlist no seu Spotify...";

            try {
                // CORREÇÃO: URL oficial da API do Spotify restaurada
                const apiBase = 'https://api.spotify.com/v1';
                
                // 1. Pegar ID do seu usuário
                const userResponse = await fetch(apiBase + '/me', {
                    headers: { 'Authorization': 'Bearer ' + accessToken }
                });
                
                if (!userResponse.ok) throw new Error("Falha ao buscar usuário");
                const userData = await userResponse.json();
                const userId = userData.id;

                // Capturar o nome digitado pelo usuário (ou usar padrão se estiver vazio)
                const nomeInput = document.getElementById('nome_playlist').value.trim();
                const nomeFinalPlaylist = nomeInput !== "" ? nomeInput : "Mix Hiperfoco (" + new Date().toLocaleDateString() + ")";

                // 2. Criar a Playlist
                const playlistResponse = await fetch(apiBase + '/users/' + userId + '/playlists', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: nomeFinalPlaylist,
                        description: "Gerado automaticamente pelo Painel Inteligente.",
                        public: false
                    })
                });
                
                if (!playlistResponse.ok) throw new Error("Falha ao criar playlist");
                const playlistData = await playlistResponse.json();
                const playlistId = playlistData.id;

                // 3. Extrair os IDs corretamente das URLs e adicionar na playlist
                const urisParaAdicionar = linksAtuais.map(link => {
                    // Extrai o ID da música independente se tem parâmetros na URL (como ?si=...)
                    let id = link.includes('track/') ? link.split('track/')[1].split('?')[0] : link.split('/').pop().split('?')[0];
                    return 'spotify:track:' + id;
                });

                const addTracksResponse = await fetch(apiBase + '/playlists/' + playlistId + '/tracks', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uris: urisParaAdicionar })
                });

                if (!addTracksResponse.ok) throw new Error("Falha ao adicionar músicas");

                btn.innerText = "✅ Sucesso! Clique para abrir no Spotify";
                btn.onclick = () => window.open(playlistData.external_urls.spotify, '_blank');
                btn.style.backgroundColor = "#1ed760";

            } catch (error) {
                console.error(error);
                alert("Ops! Erro ao falar com o Spotify. Suas músicas estão com o link original?");
                btn.innerText = "Tentar Novamente";
            }
        }
    </script>
</body>
</html>
