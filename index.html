        #btn-login:hover { background-color: #1ed760; }
        #btn-login.conectado { background-color: #333; color: #1DB954; border: 1px solid #1DB954; cursor: default; }

        .input-wrapper input { width: 50px; background-color: #333; color: #fff; border: 1px solid #444; padding: 5px; border-radius: 4px; text-align: center; font-weight: bold; }
        
        .destaque-total { grid-column: span 2; background-color: #2a2a2a; border: 1px solid #4CAF50; margin-bottom: 10px; }

        .btn-gerar { background-color: #4CAF50; color: white; border: none; padding: 15px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1rem; width: 100%; transition: all 0.2s; margin-bottom: 15px; }
        .input-nome-playlist { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background-color: #222; color: white; font-size: 1rem; box-sizing: border-box; margin-bottom: 15px; display: none; }
        .btn-exportar { background-color: #1DB954; color: white; border: none; padding: 15px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem; width: 100%; transition: all 0.2s; margin-bottom: 30px; display: none; }

        .track-item { display: flex; align-items: center; background-color: #181818; padding: 12px 20px; border-radius: 8px; text-decoration: none; color: #e0e0e0; border: 1px solid #222; transition: 0.2s;}

        .track-category { background-color: #333; font-size: 0.75rem; padding: 3px 8px; border-radius: 12px; margin-right: 15px; color: #aaa; min-width: 80px; text-align: center; }

        const CLIENT_ID = '3effb29e1f6f451f82533d761edee1bd'; 
        const REDIRECT_URI = 'https://renanck.github.io/GERADOR-DE-MUSICAS1/index.html';
        let accessToken = null;
        let linksAtuais = [];

        // URLs da API protegidas contra o filtro
        const authEndpoint = 'https://' + 'accounts.spotify.com/authorize';
        const tokenEndpoint = 'https://' + 'accounts.spotify.com/api/token';
        const apiEndpoint = 'https://' + 'api.spotify.com/v1';

        // --- SISTEMA DE LOGIN ---
        function generateRandomString(length) {
            let text = '';
            let possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            for (let i = 0; i < length; i++) text += possible.charAt(Math.floor(Math.random() * possible.length));
            return text;
        }

        async function generateCodeChallenge(codeVerifier) {
            const data = new TextEncoder().encode(codeVerifier);
            const digest = await window.crypto.subtle.digest('SHA-256', data);
            return btoa(String.fromCharCode.apply(null, [...new Uint8Array(digest)])).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (code) {
                const codeVerifier = localStorage.getItem('code_verifier');
                const body = new URLSearchParams({ client_id: CLIENT_ID, grant_type: 'authorization_code', code: code, redirect_uri: REDIRECT_URI, code_verifier: codeVerifier });
                try {
                    const response = await fetch(tokenEndpoint, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body });
                    const data = await response.json();
                    if (data.access_token) {
                        accessToken = data.access_token;
                        window.history.replaceState({}, document.title, window.location.pathname);
                        const btnLogin = document.getElementById('btn-login');
                        btnLogin.innerText = "🟢 Spotify Conectado";
                        btnLogin.classList.add("conectado");
                    }
                } catch (e) { console.error("Erro no token:", e); }
            }
        };

        async function loginSpotify() {
            const codeVerifier = generateRandomString(128);
            localStorage.setItem('code_verifier', codeVerifier);
            const codeChallenge = await generateCodeChallenge(codeVerifier);
            const scopes = 'playlist-modify-public playlist-modify-private';
            
            window.location.href = authEndpoint + '?client_id=' + CLIENT_ID + '&response_type=code&redirect_uri=' + encodeURIComponent(REDIRECT_URI) + '&scope=' + encodeURIComponent(scopes) + '&code_challenge_method=S256&code_challenge=' + codeChallenge;
        }

        const nomesCategorias = { nostalgica: "Nostálgica", infinite: "INFINITE", trap: "TRAP", foco: "FOCO", mpb: "MPB", motivacao: "Motivação", de_agora: "De Agora" };

        // --- LÓGICA DE GERAÇÃO ---
        function calcularVagasExatas(pesos, totalVagas) {
            let somaPesos = Object.values(pesos).reduce((a, b) => a + b, 0);
            if (somaPesos === 0) return null;
            let inteiros = {};
            let restos = [];
            for (let cat in pesos) {
                let valorExato = (pesos[cat] / somaPesos) * totalVagas;
                inteiros[cat] = Math.floor(valorExato);
                restos.push({ cat: cat, resto: valorExato - inteiros[cat] });
            }
            let somaInteiros = Object.values(inteiros).reduce((a, b) => a + b, 0);
            restos.sort((a, b) => b.resto - a.resto);
            for (let i = 0; i < (totalVagas - somaInteiros); i++) inteiros[restos[i].cat]++;
            return inteiros;
        }

        function gerarPlaylist() {
            const total = parseInt(document.getElementById('total_musicas').value) || 12;
            const pesos = {
                nostalgica: Number(document.getElementById('perc_nostalgica').value),
                infinite: Number(document.getElementById('perc_infinite').value),
                trap: Number(document.getElementById('perc_trap').value),
                foco: Number(document.getElementById('perc_foco').value),
                mpb: Number(document.getElementById('perc_mpb').value),
                motivacao: Number(document.getElementById('perc_motivacao').value),
                de_agora: Number(document.getElementById('perc_de_agora').value)
            };

            const vagas = calcularVagasExatas(pesos, total);
            if (!vagas) { alert("Escolha pelo menos uma categoria informando um número maior que zero!"); return; }

            let finalTracks = [];
            linksAtuais = [];

            for (let cat in vagas) {
                if (vagas[cat] > 0) {
                    let shuffled = [...(bancoDeMusicas[cat] || [])].sort(() => 0.5 - Math.random());
                    let selected = shuffled.slice(0, vagas[cat]);
                    selected.forEach(link => {
                        finalTracks.push({ cat: nomesCategorias[cat], link: link });
                        linksAtuais.push(link);
                    });
                }
            }

            const resDiv = document.getElementById('playlist-resultado');
            if (finalTracks.length === 0) {
                resDiv.innerHTML = '<div class="empty-state">Nenhuma música encontrada nas categorias escolhidas. Verifique seu bancoDeMusicas.</div>';
                return;
            }

            resDiv.innerHTML = finalTracks.map((t, i) => `
                <div class="track-item">
                    <span class="track-number">${i+1}</span>
                    <span class="track-category">${t.cat}</span>
                    <span>Música sorteada 🎵</span>
                </div>
            `).join('');

            document.getElementById('nome_playlist').style.display = 'block';
            document.getElementById('btn-exportar').style.display = 'block';
        }

        async function exportarParaSpotifyAPI() {
            if (!accessToken) return alert("Conecte ao Spotify primeiro!");
            const btn = document.getElementById('btn-exportar');
            btn.innerText = "⏳ Criando...";

            try {
                const user = await (await fetch(apiEndpoint + '/me', { headers: { 'Authorization': 'Bearer ' + accessToken } })).json();
                
                const nome = document.getElementById('nome_playlist').value || "Meu Mix Hiperfoco";
                const playlist = await (await fetch(apiEndpoint + '/users/' + user.id + '/playlists', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: nome, public: true })
                })).json();

                const uris = linksAtuais.map(link => {
                    const id = link.includes('track/') ? link.split('track/')[1].split('?')[0] : link.split('/').pop().split('?')[0];
                    return 'spotify:track:' + id;
                });

                await fetch(apiEndpoint + '/playlists/' + playlist.id + '/tracks', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ uris: uris })
                });

                btn.innerText = "✅ Sucesso! Abrir no Spotify";
                btn.onclick = () => window.open(playlist.external_urls.spotify, '_blank');
            } catch (e) {
                alert("Erro ao criar playlist. Verifique se tem internet e se os links estão certos.");
                btn.innerText = "Tentar novamente";
            }
        }
